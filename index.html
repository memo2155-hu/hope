<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sanad Workspace</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
<h1>Sanad Workspace</h1>

<div class="nav">
  <button class="nav-btn active" data-sec="home">Home</button>
  <button class="nav-btn" data-sec="tasks">Tasks</button>
  <button class="nav-btn" data-sec="homeworks">Homeworks</button>
  <button class="nav-btn" data-sec="notes">Notes</button>
</div>

<div class="search-box">
  <input id="searchInput" placeholder="Search...">
</div>

</header>

<main>

<section id="home" class="section">
  <div class="welcome">Welcome back 👋</div>

  <div class="cards">
    <div class="card" id="taskCount">Tasks: 0</div>
    <div class="card" id="hwCount">Homeworks: 0</div>
    <div class="card" id="noteCount">Notes: 0</div>
  </div>
</section>

<section id="tasks" class="section hidden">
  <h2>Tasks</h2>
  <input id="taskInput">
  <button onclick="addItem('tasks')">Add</button>
  <ul id="taskList"></ul>
</section>

<section id="homeworks" class="section hidden">
  <h2>Homeworks</h2>
  <input id="hwInput">
  <button onclick="addItem('hw')">Add</button>
  <ul id="hwList"></ul>
</section>

<section id="notes" class="section hidden">
  <h2>Notes</h2>
  <input id="noteInput">
  <button onclick="addItem('notes')">Add</button>
  <ul id="noteList"></ul>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
