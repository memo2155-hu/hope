<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة سند</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<!-- ================= LOGIN ================= -->
<div id="loginPage" class="center">

    <div class="card">

        <h1>👋 مرحباً بك</h1>
        <p>سجل الدخول للمتابعة</p>

        <input id="username" placeholder="اسم المستخدم">
        <input id="password" type="password" placeholder="كلمة المرور">

        <button onclick="login()">تسجيل الدخول</button>

        <p id="msg"></p>

    </div>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="app" class="hidden">

    <header>
        <h1>💙 منصة سند</h1>
        <button onclick="logout()">تسجيل خروج</button>
    </header>

    <main>

        <div class="card">
            <h2>مرحباً 👋</h2>
            <p id="welcome"></p>
        </div>

        <div class="grid">

            <div class="box">
                <h3>📊 الإحصائيات</h3>
                <p>عدد المستخدمين: 120</p>
            </div>

            <div class="box">
                <h3>🧠 الخدمات</h3>
                <p>دعم - تأهيل - استشارات</p>
            </div>

            <div class="box">
                <h3>📞 تواصل</h3>
                <p>24/7 دعم متواصل</p>
            </div>

        </div>

    </main>

</div>

<script src="script.js"></script>
</body>
</html>
