<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة سند</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center">

    <div class="card">
        <h1>👋 مرحباً بك</h1>

        <input id="username" placeholder="اسم المستخدم">
        <input id="password" type="password" placeholder="كلمة المرور">

        <button onclick="login()">دخول</button>

        <p id="msg"></p>
    </div>

</div>

<!-- DASHBOARD -->
<div id="app" class="hidden">

    <!-- NAV -->
    <header>
        <h2>💙 منصة سند</h2>

        <div class="nav">
            <button onclick="showSection('home')">Home</button>
            <button onclick="showSection('tasks')">Tasks</button>
            <button onclick="showSection('homeworks')">Homeworks</button>
            <button onclick="showSection('notes')">Notes</button>
            <button onclick="logout()">Logout</button>
        </div>
    </header>

    <main>

        <!-- HOME -->
        <section id="home" class="section">
            <h2>🏠 Home</h2>
            <p id="welcome"></p>
        </section>

        <!-- TASKS -->
        <section id="tasks" class="section hidden">
            <h2>✅ Tasks</h2>

            <input id="taskInput" placeholder="أضف مهمة">
            <button onclick="addTask()">إضافة</button>

            <ul id="taskList"></ul>
        </section>

        <!-- HOMEWORKS -->
        <section id="homeworks" class="section hidden">
            <h2>📚 Homeworks</h2>

            <input id="hwInput" placeholder="أضف واجب">
            <button onclick="addHomework()">إضافة</button>

            <ul id="hwList"></ul>
        </section>

        <!-- NOTES -->
        <section id="notes" class="section hidden">
            <h2>📝 Notes</h2>

            <textarea id="noteInput" placeholder="اكتب ملاحظتك..."></textarea>
            <button onclick="addNote()">حفظ</button>

            <div id="notesList"></div>
        </section>

    </main>

</div>

<script src="script.js"></script>
</body>
</html>
