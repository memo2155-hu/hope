<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة سند</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
  <div class="card">
    <h2>👋 تسجيل الدخول</h2>

    <input id="username" placeholder="اسم المستخدم">
    <input id="password" type="password" placeholder="كلمة المرور">

    <button onclick="login()">دخول</button>

    <p id="msg"></p>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header>
  <h2>💙 منصة سند</h2>

  <div class="nav">
    <button onclick="show('tasks')">✅</button>
    <button onclick="show('homeworks')">📚</button>
    <button onclick="show('notes')">📝</button>
    <button onclick="logout()">🚪</button>
  </div>
</header>

<main>

<section id="tasks" class="section">
  <h3>Tasks</h3>
  <input id="taskInput">
  <button onclick="addTask()">➕ Add</button>
  <button onclick="clearList('taskList')">🧹 Clear</button>
  <ul id="taskList"></ul>
</section>

<section id="homeworks" class="section hidden">
  <h3>Homeworks</h3>
  <input id="hwInput">
  <button onclick="addHW()">➕ Add</button>
  <button onclick="clearList('hwList')">🧹 Clear</button>
  <ul id="hwList"></ul>
</section>

<section id="notes" class="section hidden">
  <h3>Notes</h3>
  <textarea id="noteInput"></textarea>
  <button onclick="addNote()">➕ Add</button>
  <button onclick="clearList('noteList')">🧹 Clear</button>
  <ul id="noteList"></ul>
</section>

</main>

</div>

<script src="script.js"></script>
</body>
</html>
