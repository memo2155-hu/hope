<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sanad Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="bg"></div>

<header>
<h1>Sanad Dashboard</h1>

<nav>
<button onclick="show('home')"><i class="fa fa-home"></i> Home</button>
<button onclick="show('tasks')"><i class="fa fa-check"></i> Tasks</button>
<button onclick="show('homeworks')"><i class="fa fa-book"></i> Homeworks</button>
<button onclick="show('notes')"><i class="fa fa-note-sticky"></i> Notes</button>
</nav>
</header>

<main>

<!-- HOME -->
<section id="home" class="page">
  <div class="hero">Welcome Back 👋</div>

  <div class="stats">
    <div class="card" id="taskCount"></div>
    <div class="card" id="hwCount"></div>
    <div class="card" id="noteCount"></div>
  </div>

  <canvas id="chart"></canvas>
</section>

<!-- TASKS -->
<section id="tasks" class="page hidden">
  <h2>Tasks</h2>

  <input id="taskInput" placeholder="Add task">
  <button onclick="addTask()">Add Task</button>

  <ul id="taskList"></ul>
</section>

<!-- HOMEWORKS -->
<section id="homeworks" class="page hidden">
  <h2>Homeworks</h2>

  <input id="hwInput" placeholder="Add homework">
  <button onclick="addHomework()">Add Homework</button>

  <ul id="hwList"></ul>
</section>

<!-- NOTES -->
<section id="notes" class="page hidden">
  <h2>Notes</h2>

  <input id="noteInput" placeholder="Add note">
  <button onclick="addNote()">Add Note</button>

  <ul id="noteList"></ul>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
