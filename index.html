<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hope Center</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #cce7ff;
}

.logo {
    position: fixed;
    top: 15px;
    left: 20px;
    font-size: 30px;
    color: white;
}

.container {
    background: white;
    padding: 30px;
    margin: 100px auto;
    width: 90%;
    max-width: 500px;
    border-radius: 15px;
    text-align: center;
}

input, textarea {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
}

button {
    width: 90%;
    padding: 12px;
    margin: 8px 0;
    background: #007BFF;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}

.section {
    display: none;
}

ul {
    text-align: left;
}

.student-box {
    background: #e6f2ff;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 8px;
}
</style>
</head>

<body>

<h2 class="logo">Hope Center</h2>

<!-- LOGIN -->
<div class="container section" id="loginPage" style="display:block;">
    <h2><i class="fa fa-user"></i> Login</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="container section" id="dashboardPage">
    <h2 id="welcome"></h2>

    <div class="student-box">
        👦 Student: <input id="studentName" placeholder="Enter student name">
    </div>

    <button onclick="showSection('tasksPage')"><i class="fa fa-list"></i> Tasks</button>
    <button onclick="showSection('homeworkPage')"><i class="fa fa-book"></i> Homework</button>
    <button onclick="showSection('notesPage')"><i class="fa fa-pen"></i> Notes</button>

    <button onclick="logout()">Logout</button>
</div>

<!-- TASKS -->
<div class="container section" id="tasksPage">
    <h2><i class="fa fa-list"></i> Tasks</h2>
    <ul id="tasksList"></ul>
    <input id="taskInput" placeholder="Add task">
    <button onclick="addTask()">Add</button>
    <button onclick="clearTasks()">Clear</button>
    <button onclick="showSection('dashboardPage')">Back</button>
</div>

<!-- HOMEWORK -->
<div class="container section" id="homeworkPage">
    <h2><i class="fa fa-book"></i> Homework</h2>
    <ul id="homeworkList"></ul>
    <input id="homeworkInput" placeholder="Add homework">
    <button onclick="addHomework()">Add</button>
    <button onclick="clearHomework()">Clear</button>
    <button onclick="showSection('dashboardPage')">Back</button>
</div>

<!-- NOTES -->
<div class="container section" id="notesPage">
    <h2><i class="fa fa-pen"></i> Notes</h2>
    <textarea id="notesArea"></textarea>
    <button onclick="saveNotes()">Save</button>
    <button onclick="clearNotes()">Clear</button>
    <button onclick="showSection('dashboardPage')">Back</button>
</div>

<script>
let currentUser = "";

// LOGIN
function login() {
    let user = document.getElementById("username").value.trim().toLowerCase();
    let pass = document.getElementById("password").value;

    if(user === "mariem") {
        alert("This username is not allowed ❌");
        return;
    }

    if(pass === "1234" && user !== "") {
        currentUser = user;
        document.getElementById("welcome").innerText = "Welcome " + user;
        showSection("dashboardPage");
        loadAll();
    } else {
        alert("Wrong Password ❌");
    }
}

// NAVIGATION
function showSection(id) {
    document.querySelectorAll(".section").forEach(s => s.style.display = "none");
    document.getElementById(id).style.display = "block";
}

// LOGOUT
function logout() {
    showSection("loginPage");
}

// TASKS
function addTask() {
    let val = document.getElementById("taskInput").value;
    let data = JSON.parse(localStorage.getItem("tasks")) || [];
    data.push(val);
    localStorage.setItem("tasks", JSON.stringify(data));
    loadTasks();
}

function loadTasks() {
    let data = JSON.parse(localStorage.getItem("tasks")) || [];
    let list = document.getElementById("tasksList");
    list.innerHTML = "";
    data.forEach((t,i) => {
        let li = document.createElement("li");
        li.innerHTML = t + " <button onclick='deleteTask("+i+")'>❌</button>";
        list.appendChild(li);
    });
}

function deleteTask(i) {
    let data = JSON.parse(localStorage.getItem("tasks"));
    data.splice(i,1);
    localStorage.setItem("tasks", JSON.stringify(data));
    loadTasks();
}

function clearTasks() {
    localStorage.removeItem("tasks");
    loadTasks();
}

// HOMEWORK
function addHomework() {
    let val = document.getElementById("homeworkInput").value;
    let data = JSON.parse(localStorage.getItem("homework")) || [];
    data.push(val);
    localStorage.setItem("homework", JSON.stringify(data));
    loadHomework();
}

function loadHomework() {
    let data = JSON.parse(localStorage.getItem("homework")) || [];
    let list = document.getElementById("homeworkList");
    list.innerHTML = "";
    data.forEach((h,i) => {
        let li = document.createElement("li");
        li.innerHTML = h + " <button onclick='deleteHomework("+i+")'>❌</button>";
        list.appendChild(li);
    });
}

function deleteHomework(i) {
    let data = JSON.parse(localStorage.getItem("homework"));
    data.splice(i,1);
    localStorage.setItem("homework", JSON.stringify(data));
    loadHomework();
}

function clearHomework() {
    localStorage.removeItem("homework");
    loadHomework();
}

// NOTES
function saveNotes() {
    let val = document.getElementById("notesArea").value;
    localStorage.setItem("notes", val);
}

function clearNotes() {
    localStorage.removeItem("notes");
    document.getElementById("notesArea").value = "";
}

function loadNotes() {
    let val = localStorage.getItem("notes");
    document.getElementById("notesArea").value = val || "";
}

// LOAD
function loadAll() {
    loadTasks();
    loadHomework();
    loadNotes();
}
</script>

</body>
</html>
