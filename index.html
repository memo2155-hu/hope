<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة سند</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Cairo, sans-serif;
            background: #0f172a;
            color: white;
        }

        /* ===== Login ===== */
        #loginPage {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #0077b6, #0f172a);
        }

        .box {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
            backdrop-filter: blur(15px);
        }

        input {
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: #00b4d8;
            color: white;
            cursor: pointer;
        }

        /* ===== App ===== */
        #app {
            display: none;
        }

        header {
            background: #0077b6;
            padding: 20px;
            text-align: center;
        }

        main {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            margin: 10px 0;
        }

        .logout {
            background: red;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<!-- ================= LOGIN PAGE ================= -->
<div id="loginPage">
    <div class="box">
        <h2>تسجيل الدخول</h2>

        <input id="username" placeholder="اسم المستخدم">
        <input id="password" type="password" placeholder="كلمة المرور">

        <button onclick="login()">دخول</button>

        <p id="msg"></p>
    </div>
</div>

<!-- ================= MAIN APP ================= -->
<div id="app">

    <header>
        <h1>منصة سند 💙</h1>
        <p>مرحباً بك</p>
        <button class="logout" onclick="logout()">تسجيل خروج</button>
    </header>

    <main>
        <div class="card">
            <h2>👋 أهلاً</h2>
            <p id="welcome"></p>
        </div>

        <div class="card">
            <h2>خدماتنا</h2>
            <p>دعم - تأهيل - استشارات</p>
        </div>
    </main>

</div>

<script>
/* ===== LOGIN ===== */
function login() {

    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();
    const msg = document.getElementById("msg");

    const users = [
        { user: "admin", pass: "1234" },
        { user: "user", pass: "1111" }
    ];

    const found = users.find(u => u.user === user && u.pass === pass);

    if (found) {

        localStorage.setItem("login", "true");
        localStorage.setItem("user", user);

        showApp();

    } else {
        msg.style.color = "red";
        msg.innerText = "بيانات غير صحيحة ❌";
    }
}

/* ===== SHOW APP ===== */
function showApp() {
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("welcome").innerText =
        "أهلاً " + localStorage.getItem("user");
}

/* ===== LOGOUT ===== */
function logout() {
    localStorage.removeItem("login");
    localStorage.removeItem("user");

    location.reload();
}

/* ===== AUTO CHECK ===== */
window.onload = function () {
    if (localStorage.getItem("login") === "true") {
        showApp();
    }
};
</script>

</body>
</html>
