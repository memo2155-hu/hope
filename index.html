<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>منصة سند</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<!-- LOGIN -->
<div id="loginPage" class="center">
    <div class="card">
        <h1>👋 أهلاً بك</h1>

        <input id="username" placeholder="اسم المستخدم">
        <input id="password" type="password" placeholder="كلمة المرور">

        <button onclick="login()">🚀 دخول</button>

        <p id="msg"></p>
    </div>
</div>

<!-- DASHBOARD -->
<div id="app" class="hidden">

<header>
    <h1>💙 منصة سند</h1>

    <div class="nav">
        <button onclick="showSection('home')">🏠</button>
        <button onclick="showSection('tasks')">✅</button>
        <button onclick="showSection('homeworks')">📚</button>
        <button onclick="showSection('notes')">📝</button>
        <button onclick="logout()">🚪</button>
    </div>
</header>

<main>

<section id="home" class="section">
    <h2>الرئيسية</h2>
    <p id="welcome"></p>
</section>

<section id="tasks" class="section hidden">
    <h2>المهام</h2>

    <input id="taskInput" placeholder="اكتب مهمة">

    <div class="row">
        <button onclick="addTask()">➕ إضافة</button>
        <button class="clear" onclick="clearList('taskList')">🧹 مسح</button>
    </div>

    <ul id="taskList"></ul>
</section>

<section id="homeworks" class="section hidden">
    <h2>الواجبات</h2>

    <input id="hwInput" placeholder="اكتب واجب">

    <div class="row">
        <button onclick="addHomework()">➕ إضافة</button>
        <button class="clear" onclick="clearList('hwList')">🧹 مسح</button>
    </div>

    <ul id="hwList"></ul>
</section>

<section id="notes" class="section hidden">
    <h2>الملاحظات</h2>

    <textarea id="noteInput" placeholder="اكتب ملاحظة"></textarea>

    <div class="row">
        <button onclick="addNote()">➕ إضافة</button>
        <button class="clear" onclick="clearList('notesList')">🧹 مسح</button>
    </div>

    <ul id="notesList"></ul>
</section>

</main>
</div>

<script src="script.js"></script>
</body>
</html>
