<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sanad Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="bg"></div>

<header>
<h1>Sanad Dashboard</h1>

<div class="nav">
  <button class="nav-btn active" onclick="showSection('home',this)">🏠 Home</button>
  <button class="nav-btn" onclick="showSection('tasks',this)">✔ Tasks</button>
  <button class="nav-btn" onclick="showSection('homeworks',this)">📚 Homeworks</button>
  <button class="nav-btn" onclick="showSection('notes',this)">📝 Notes</button>
</div>
</header>

<main>

<!-- HOME -->
<section id="home" class="section">
  <div class="welcome">Welcome Back 👋</div>

  <div class="cards">
    <div class="card" id="taskCount">Tasks: 0</div>
    <div class="card" id="hwCount">Homeworks: 0</div>
    <div class="card" id="noteCount">Notes: 0</div>
  </div>

  <canvas id="chart"></canvas>
</section>

<!-- TASKS -->
<section id="tasks" class="section hidden">
  <h2>Tasks</h2>
  <input id="taskInput" placeholder="Add task">
  <button onclick="addTask()">➕ Add Task</button>
  <ul id="taskList"></ul>
</section>

<!-- HOMEWORKS -->
<section id="homeworks" class="section hidden">
  <h2>Homeworks</h2>
  <input id="hwInput" placeholder="Add homework">
  <button onclick="addHomework()">➕ Add Homework</button>
  <ul id="hwList"></ul>
</section>

<!-- NOTES -->
<section id="notes" class="section hidden">
  <h2>Notes</h2>
  <input id="noteInput" placeholder="Add note">
  <button onclick="addNote()">➕ Add Note</button>
  <ul id="noteList"></ul>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
