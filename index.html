<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sanad Notes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f17;
  color:#fff;
}

header{
  text-align:center;
  padding:20px;
}

.nav{
  display:flex;
  justify-content:center;
  gap:10px;
}

.nav button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  background:#333;
  color:white;
  cursor:pointer;
}

.nav button.active{
  background:#2563eb;
}

.section{padding:20px;}
.hidden{display:none;}

input{
  padding:8px;
  margin:5px;
}

button{
  padding:8px;
  cursor:pointer;
}

ul{list-style:none; padding:0;}

li{
  display:flex;
  justify-content:space-between;
  background:#222;
  margin:5px 0;
  padding:10px;
  border-radius:6px;
}

.delete{
  background:red;
  border:none;
  color:white;
  border-radius:5px;
}

.done span{
  text-decoration:line-through;
  opacity:0.6;
}
</style>
</head>

<body>

<header>
<h1>Sanad Workspace</h1>

<div class="nav">
<button data-sec="home" class="active">Home</button>
<button data-sec="tasks">Tasks</button>
<button data-sec="homeworks">Homeworks</button>
<button data-sec="notes">Notes</button>
</div>
</header>

<section id="home" class="section">
<h2>Dashboard</h2>
<p id="counts">Tasks: 0 | Homeworks: 0 | Notes: 0</p>
<canvas id="chart"></canvas>
</section>

<section id="tasks" class="section hidden">
<h2>Tasks</h2>
<input id="taskInput">
<button id="addTask">Add</button>
<ul id="taskList"></ul>
</section>

<section id="homeworks" class="section hidden">
<h2>Homeworks</h2>
<input id="hwInput">
<button id="addHW">Add</button>
<ul id="hwList"></ul>
</section>

<section id="notes" class="section hidden">
<h2>Notes</h2>
<input id="noteInput">
<button id="addNote">Add</button>
<ul id="noteList"></ul>
</section>

<script>
console.log("JS شغال 👍");

/* NAV */
document.querySelectorAll(".nav button").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".section").forEach(s=>s.classList.add("hidden"));
    document.getElementById(btn.dataset.sec).classList.remove("hidden");

    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  });
});

/* CREATE ITEM */
function createItem(text){
  let li=document.createElement("li");

  let span=document.createElement("span");
  span.textContent=text;

  span.addEventListener("click", ()=>{
    li.classList.toggle("done");
  });

  let del=document.createElement("button");
  del.textContent="Delete";
  del.className="delete";

  del.addEventListener("click", ()=>{
    li.remove();
    update();
  });

  li.append(span, del);
  return li;
}

/* ELEMENTS */
const taskList=document.getElementById("taskList");
const hwList=document.getElementById("hwList");
const noteList=document.getElementById("noteList");

/* ADD */
document.getElementById("addTask").addEventListener("click", ()=>{
  let val=document.getElementById("taskInput").value.trim();
  if(!val) return;
  taskList.appendChild(createItem(val));
  document.getElementById("taskInput").value="";
  update();
});

document.getElementById("addHW").addEventListener("click", ()=>{
  let val=document.getElementById("hwInput").value.trim();
  if(!val) return;
  hwList.appendChild(createItem(val));
  document.getElementById("hwInput").value="";
  update();
});

document.getElementById("addNote").addEventListener("click", ()=>{
  let val=document.getElementById("noteInput").value.trim();
  if(!val) return;
  noteList.appendChild(createItem(val));
  document.getElementById("noteInput").value="";
  update();
});

/* UPDATE */
function update(){
  let t=taskList.children.length;
  let h=hwList.children.length;
  let n=noteList.children.length;

  document.getElementById("counts").innerText=
    `Tasks: ${t} | Homeworks: ${h} | Notes: ${n}`;

  draw(t,h,n);
}

/* CHART */
let chart;

function draw(t=0,h=0,n=0){
  let ctx=document.getElementById("chart");

  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:"doughnut",
    data:{
      labels:["Tasks","Homeworks","Notes"],
      datasets:[{
        data:[t,h,n]
      }]
    }
  });
}

draw();
</script>

</body>
</html>
