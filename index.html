<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sanad Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="bg"></div>

<header>
<h1>Sanad Platform</h1>

<div class="nav">
<button onclick="showSection('home')"><i class="fa-solid fa-house"></i> Home</button>
<button onclick="showSection('tasks')"><i class="fa-solid fa-list-check"></i> Tasks</button>
<button onclick="showSection('homeworks')"><i class="fa-solid fa-book"></i> Homeworks</button>
<button onclick="showSection('notes')"><i class="fa-solid fa-note-sticky"></i> Notes</button>
</div>
</header>

<main>

<!-- HOME -->
<section id="home" class="section">

<h2>Dashboard</h2>

<div class="hero">
<h3>Welcome Back 👋</h3>
<p>Manage your tasks, homeworks and notes easily</p>
</div>

<div class="stats">
<div class="box" id="taskCount"></div>
<div class="box" id="hwCount"></div>
<div class="box" id="noteCount"></div>
</div>

<canvas id="chart"></canvas>

</section>

<!-- TASKS -->
<section id="tasks" class="section hidden">

<h2>Tasks</h2>

<div class="card">
<input id="taskInput" placeholder="Add task">
<input id="searchTask" placeholder="Search..." oninput="renderTasks()">

<div class="row">
<button onclick="addTask()">Add Task</button>
<button class="clear" onclick="clearList('tasks')">Clear</button>
</div>
</div>

<ul id="taskList"></ul>
</section>

<!-- HOMEWORKS -->
<section id="homeworks" class="section hidden">

<h2>Homeworks</h2>

<div class="card">
<input id="hwInput" placeholder="Add homework">

<div class="row">
<button onclick="addHomework()">Add</button>
<button class="clear" onclick="clearList('homeworks')">Clear</button>
</div>
</div>

<ul id="hwList"></ul>
</section>

<!-- NOTES -->
<section id="notes" class="section hidden">

<h2>Notes</h2>

<div class="card">
<textarea id="noteInput" placeholder="Add note"></textarea>

<div class="row">
<button onclick="addNote()">Add</button>
<button class="clear" onclick="clearList('notes')">Clear</button>
</div>
</div>

<ul id="notesList"></ul>

</section>

</main>

<script src="script.js"></script>
</body>
</html>
