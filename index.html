<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sanad Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="bg"></div>

<header>
<h1>Sanad Dashboard</h1>
</header>

<main>

<section class="hero">
  <h2>Welcome Back 👋</h2>
  <p>Your tasks, homeworks and notes in one place</p>
</section>

<section class="stats">
  <div class="card" id="taskCount">Tasks: 0</div>
  <div class="card" id="hwCount">Homeworks: 0</div>
  <div class="card" id="noteCount">Notes: 0</div>
</section>

<section class="box">
<h3>Tasks</h3>
<input id="taskInput" placeholder="Add task">
<button onclick="addTask()">Add</button>
<ul id="taskList"></ul>
</section>

<section class="box">
<h3>Homeworks</h3>
<input id="hwInput" placeholder="Add homework">
<button onclick="addHomework()">Add</button>
<ul id="hwList"></ul>
</section>

<section class="box">
<h3>Notes</h3>
<input id="noteInput" placeholder="Add note">
<button onclick="addNote()">Add</button>
<ul id="noteList"></ul>
</section>

<canvas id="chart"></canvas>

</main>

<script src="script.js"></script>
</body>
</html>
